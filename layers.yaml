      roles: [producer, processor]
      url: https://opengeohub.org
    - name: BRANCH Institute
      roles: [host]
      url: https://branch-institute.org
    layers:
    - id: soil-db-test-soc
      title: Soil Organic Carbon
      description: Soil organic carbon content.
      filepath: soil-db/soil-db-test-soc.tif
      datetime: '2000-01-01'
      doi: null
      thumbnail: null
      unit: g/kg
      scale: 0.1
      offset: 0
      datatype: int16
    - id: soil-db-test-bulkdesn
      title: Bulk Density
      description: TODO
      filepath: soil-db/soil-db-test-bulkdesn.tif
      datetime: '2000-01-01'
      doi: null
      thumbnail: null
      unit: TODO
      scale: TODO
      offset: TODO
      datatype: TODO

